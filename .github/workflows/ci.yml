name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        # Include all extras needed to collect and run every test module.
        # llm/ocr/qdrant are excluded: torch (~2 GB) and system OCR deps
        # are not required by any current test.
        run: pip install -e ".[dev,api,pdf,retrieval,multimodal,eval]"

      - name: Lint (ruff)
        run: ruff check src/ tests/ apps/

      - name: Format check (black)
        run: black --check src/ tests/ apps/

      - name: Test (pytest)
        env:
          MRTA_ENV: test
        run: pytest

  type-check:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev,api,pdf,retrieval,multimodal,eval]"

      - name: Type check (mypy)
        run: mypy src/ apps/ --ignore-missing-imports

  audit:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -e ".[dev,api,pdf,retrieval,multimodal,eval]"

      - name: Vulnerability scan (pip-audit)
        # continue-on-error: transient PyPI 503s can crash pip-audit; audit is best-effort in CI
        # --skip-editable: mrta is a local editable install, not on PyPI
        # --ignore-vuln CVE-2025-3000: torch vulnerability with no fix available yet
        continue-on-error: true
        run: pip-audit --skip-editable --ignore-vuln CVE-2025-3000

  docker:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t mrta-api:ci .

      - name: Smoke test /health
        run: |
          docker run -d --name mrta-ci -e MRTA_ENV=test -p 8000:8000 mrta-api:ci
          for i in 1 2 3 4 5; do
            sleep 6
            curl --fail --silent http://localhost:8000/health && docker stop mrta-ci && exit 0
            echo "Attempt $i failed, retrying..."
          done
          echo "=== Container logs ==="
          docker logs mrta-ci
          docker stop mrta-ci
          exit 1
